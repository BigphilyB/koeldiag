<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0e17">
<title>KoelDiag — Koelmachine Diagnostiek</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0a0e17;
  --bg-card: #111827;
  --bg-card-elevated: #1a2235;
  --bg-input: #0d1220;
  --border-subtle: #1e2a3f;
  --border-active: #3b82f6;
  --text-primary: #e8edf5;
  --text-secondary: #8899b2;
  --text-muted: #4a5c75;
  --text-value: #f0f4fa;
  --accent-blue: #3b82f6;
  --accent-blue-dim: #1e3a6e;
  --accent-green: #10b981;
  --accent-green-dim: #064e3b;
  --accent-red: #ef4444;
  --accent-red-dim: #7f1d1d;
  --accent-amber: #f59e0b;
  --accent-amber-dim: #78350f;
  --accent-cyan: #06b6d4;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
  --font-sans: 'IBM Plex Sans', system-ui, sans-serif;
  --radius-sm: 6px;
  --radius-md: 10px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
:focus-visible { outline: 2px solid var(--accent-blue); outline-offset: 2px; }
.sr-only { position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0; }

.app { max-width: 520px; margin: 0 auto; padding: 12px; padding-bottom: env(safe-area-inset-bottom, 16px); }

/* ─── Header ─── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 0 14px; border-bottom: 1px solid var(--border-subtle); margin-bottom: 14px;
}
.brand { display: flex; align-items: center; gap: 10px; }
.logo {
  width: 34px; height: 34px; border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
  display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0;
}
.brand-title { font-family: var(--font-mono); font-size: 1.05rem; font-weight: 700; letter-spacing: -0.02em; }
.brand-sub { font-size: 0.65rem; color: var(--text-muted); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.08em; }

/* ─── Status Badge ─── */
.badge {
  display: flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 20px;
  font-size: 0.68rem; font-weight: 600; font-family: var(--font-mono); text-transform: uppercase;
  letter-spacing: 0.05em; border: 1px solid;
}
.badge[data-s="off"] { color: var(--text-muted); border-color: var(--border-subtle); background: var(--bg-card); }
.badge[data-s="on"] { color: var(--accent-green); border-color: var(--accent-green-dim); background: rgba(16,185,129,0.08); }
.badge[data-s="wait"] { color: var(--accent-amber); border-color: var(--accent-amber-dim); background: rgba(245,158,11,0.08); animation: pulse 1.5s infinite; }
.badge[data-s="err"] { color: var(--accent-red); border-color: var(--accent-red-dim); background: rgba(239,68,68,0.08); }
.dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

/* ─── Tabs ─── */
.tabs {
  display: flex; gap: 4px; margin-bottom: 16px;
  background: var(--bg-card); border-radius: var(--radius-md); padding: 4px; border: 1px solid var(--border-subtle);
}
.tab {
  flex: 1; padding: 10px; border: none; border-radius: var(--radius-sm);
  font-family: var(--font-mono); font-size: 0.78rem; font-weight: 600;
  cursor: pointer; transition: all 0.2s; background: transparent; color: var(--text-muted);
  text-align: center;
}
.tab[aria-selected="true"] { background: var(--accent-blue-dim); color: var(--accent-blue); }
.tab:hover:not([aria-selected="true"]) { color: var(--text-secondary); }
.panel { display: none; }
.panel[data-active] { display: block; }

/* ─── Buttons ─── */
.btn {
  padding: 10px 16px; border: 1px solid var(--accent-blue-dim); border-radius: var(--radius-sm);
  background: rgba(59,130,246,0.12); color: var(--accent-blue);
  font-family: var(--font-mono); font-size: 0.78rem; font-weight: 600; cursor: pointer;
  transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px;
}
.btn:hover:not(:disabled) { background: rgba(59,130,246,0.2); border-color: var(--accent-blue); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-full { width: 100%; justify-content: center; }
.btn-green { border-color: var(--accent-green-dim); background: rgba(16,185,129,0.12); color: var(--accent-green); }
.btn-green:hover:not(:disabled) { border-color: var(--accent-green); background: rgba(16,185,129,0.2); }
.btn-red { border-color: var(--accent-red-dim); background: rgba(239,68,68,0.12); color: var(--accent-red); }
.btn-red:hover:not(:disabled) { border-color: var(--accent-red); background: rgba(239,68,68,0.2); }
.btn-sm { padding: 6px 10px; font-size: 0.7rem; }

/* ─── Cards / Inputs ─── */
.card {
  background: var(--bg-card); border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 8px;
}
.section-hdr {
  display: flex; align-items: center; gap: 6px; margin-bottom: 10px;
  padding-bottom: 8px; border-bottom: 1px solid var(--border-subtle);
}
.section-title {
  font-family: var(--font-mono); font-size: 0.7rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-secondary);
}
input[type="text"], input[type="number"], select {
  background: var(--bg-input); color: var(--text-primary);
  border: 1px solid var(--border-subtle); border-radius: var(--radius-sm);
  padding: 8px 10px; font-family: var(--font-mono); font-size: 0.8rem; width: 100%;
}
input:focus, select:focus { border-color: var(--accent-blue); outline: none; }
label { font-size: 0.72rem; color: var(--text-secondary); font-weight: 600; margin-bottom: 4px; display: block; }
.form-row { display: grid; gap: 8px; margin-bottom: 10px; }
.form-row-2 { grid-template-columns: 1fr 1fr; }
.form-row-3 { grid-template-columns: 1fr 1fr 1fr; }
.form-row-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }

/* ─── Profile List ─── */
.profile-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px; background: var(--bg-card); border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm); margin-bottom: 6px; cursor: pointer; transition: all 0.2s;
}
.profile-item:hover { border-color: var(--accent-blue-dim); }
.profile-item[data-active="true"] { border-color: var(--accent-green-dim); background: rgba(16,185,129,0.05); }
.profile-name { font-weight: 600; font-size: 0.85rem; }
.profile-meta { font-family: var(--font-mono); font-size: 0.65rem; color: var(--text-muted); }
.profile-actions { display: flex; gap: 6px; }

/* ─── Register Table ─── */
.reg-row {
  display: grid; grid-template-columns: 50px 1fr 50px 55px 40px 40px 30px;
  gap: 6px; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border-subtle);
  font-size: 0.75rem;
}
.reg-row.hdr { font-weight: 600; color: var(--text-secondary); font-family: var(--font-mono); font-size: 0.65rem; border-bottom: 2px solid var(--border-subtle); }
.reg-row input { padding: 5px 6px; font-size: 0.72rem; }
.reg-row select { padding: 4px 2px; font-size: 0.7rem; }
.cb { width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent-blue); }
.del-btn {
  width: 24px; height: 24px; border: none; border-radius: 4px; cursor: pointer;
  background: rgba(239,68,68,0.15); color: var(--accent-red); font-size: 14px;
  display: flex; align-items: center; justify-content: center;
}
.del-btn:hover { background: rgba(239,68,68,0.3); }

/* ─── Dashboard Register Cards ─── */
.reg-card {
  background: var(--bg-card); border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm); padding: 10px 12px;
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.reg-card[data-fresh="true"] { border-color: var(--accent-blue-dim); box-shadow: 0 0 15px rgba(59,130,246,0.1); }
.reg-card[data-alarm="true"] { border-color: var(--accent-red-dim); box-shadow: 0 0 15px rgba(239,68,68,0.15); }
.reg-name { font-size: 0.78rem; font-weight: 600; }
.reg-addr { font-family: var(--font-mono); font-size: 0.62rem; color: var(--text-muted); }
.reg-val {
  font-family: var(--font-mono); font-size: 1.05rem; font-weight: 700; color: var(--text-value);
  text-align: right; white-space: nowrap;
}
.reg-unit { font-size: 0.68rem; font-weight: 500; color: var(--text-secondary); margin-left: 3px; }
.reg-val[data-s="null"] { color: var(--text-muted); font-style: italic; font-size: 0.78rem; }
.reg-val[data-s="on"] { color: var(--accent-green); }
.reg-val[data-s="off"] { color: var(--text-muted); }
.reg-val[data-s="alarm"] { color: var(--accent-red); }

/* ─── Stats ─── */
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 14px; }
.stat { background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-sm); padding: 8px; text-align: center; }
.stat-lbl { font-size: 0.6rem; color: var(--text-muted); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 3px; }
.stat-val { font-family: var(--font-mono); font-size: 0.85rem; font-weight: 700; color: var(--text-value); }
.stat-val.green { color: var(--accent-green); }
.stat-val.red { color: var(--accent-red); }

/* ─── Log ─── */
.log {
  background: var(--bg-input); border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm); padding: 8px; max-height: 150px; overflow-y: auto;
  font-family: var(--font-mono); font-size: 0.65rem; line-height: 1.6; color: var(--text-secondary);
}
.log-entry { display: flex; gap: 6px; }
.log-t { color: var(--text-muted); flex-shrink: 0; }
.log-m[data-t="error"] { color: var(--accent-red); }
.log-m[data-t="success"] { color: var(--accent-green); }
.log-m[data-t="info"] { color: var(--accent-blue); }
.log-m[data-t="warn"] { color: var(--accent-amber); }

.empty { text-align: center; padding: 30px 20px; color: var(--text-muted); font-size: 0.85rem; line-height: 1.5; }
.compat-warn { background: rgba(239,68,68,0.1); border: 1px solid var(--accent-red-dim); border-radius: var(--radius-md); padding: 14px; margin-bottom: 14px; text-align: center; display: none; }
.compat-warn b { color: var(--accent-red); }
.compat-warn p { font-size: 0.78rem; color: var(--text-secondary); margin-top: 4px; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}
</style>
</head>
<body>
<div class="app">

<!-- Header -->
<header class="header">
  <div class="brand">
    <div class="logo" aria-hidden="true">&#10052;</div>
    <div><div class="brand-title">KoelDiag</div><div class="brand-sub">Modbus Diagnostiek</div></div>
  </div>
  <div class="badge" data-s="off" id="badge" role="status" aria-live="polite">
    <span class="dot"></span><span id="badgeText">Niet verbonden</span>
  </div>
</header>

<div class="compat-warn" id="compat" role="alert">
  <b>Web Bluetooth niet beschikbaar</b>
  <p>Gebruik Chrome op Android of Bluefy op iOS.</p>
</div>

<!-- Tabs -->
<div class="tabs" role="tablist">
  <button class="tab" role="tab" aria-selected="true" data-tab="dash" id="tabDash">Dashboard</button>
  <button class="tab" role="tab" aria-selected="false" data-tab="admin" id="tabAdmin">Admin</button>
</div>

<!-- ═══════════════════════════════════════════════════════════════════ -->
<!-- DASHBOARD PANEL -->
<!-- ═══════════════════════════════════════════════════════════════════ -->
<div class="panel" data-active id="panelDash">

  <!-- Profile selector + connect -->
  <div class="card" style="display:flex;gap:8px;align-items:center;margin-bottom:14px;">
    <div style="flex:1">
      <label for="selProfile">Profiel</label>
      <select id="selProfile"><option value="">— Kies profiel —</option></select>
    </div>
    <button class="btn btn-green" id="btnConnect" style="margin-top:16px;">Verbinden</button>
  </div>

  <!-- Stats -->
  <div class="stats" id="stats">
    <div class="stat"><div class="stat-lbl">Uptime</div><div class="stat-val" id="sUp">--</div></div>
    <div class="stat"><div class="stat-lbl">Baud</div><div class="stat-val" id="sBaud">--</div></div>
    <div class="stat"><div class="stat-lbl">OK</div><div class="stat-val green" id="sOk">0</div></div>
    <div class="stat"><div class="stat-lbl">Err</div><div class="stat-val red" id="sErr">0</div></div>
  </div>

  <!-- Register data -->
  <div id="regCards"></div>

  <!-- Log -->
  <div style="margin-top:14px;">
    <div class="section-hdr"><span class="section-title">Log</span></div>
    <div class="log" id="logBox"></div>
  </div>

  <div class="empty" id="emptyState">Selecteer een profiel en druk op <strong>Verbinden</strong>.</div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════ -->
<!-- ADMIN PANEL -->
<!-- ═══════════════════════════════════════════════════════════════════ -->
<div class="panel" id="panelAdmin">

  <!-- Profile list -->
  <div class="section-hdr"><span class="section-title">Machine Profielen</span></div>
  <div id="profileList"></div>
  <button class="btn btn-full" id="btnNewProfile" style="margin:10px 0;">+ Nieuw profiel</button>

  <!-- Profile editor (hidden until a profile is selected) -->
  <div id="editor" style="display:none;">
    <div class="section-hdr" style="margin-top:16px;">
      <span class="section-title" id="editorTitle">Profiel bewerken</span>
    </div>

    <div class="form-row form-row-2">
      <div><label for="eName">Profielnaam</label><input type="text" id="eName" placeholder="Bijv. Carrier 30XA"></div>
      <div><label for="eSlaveId">Slave ID</label><input type="number" id="eSlaveId" value="1" min="1" max="247"></div>
    </div>
    <div class="form-row form-row-2">
      <div>
        <label for="eBaud">Baudrate</label>
        <select id="eBaud">
          <option value="1200">1200</option><option value="2400">2400</option>
          <option value="4800">4800</option><option value="9600" selected>9600</option>
          <option value="19200">19200</option><option value="38400">38400</option>
          <option value="57600">57600</option><option value="115200">115200</option>
        </select>
      </div>
      <div>
        <label for="eParity">Parity</label>
        <select id="eParity">
          <option value="8N1" selected>8N1</option><option value="8E1">8E1</option><option value="8O1">8O1</option>
        </select>
      </div>
    </div>

    <!-- Register map -->
    <div class="section-hdr" style="margin-top:14px;">
      <span class="section-title">Register Map</span>
    </div>
    <div class="reg-row hdr">
      <span>Adres</span><span>Naam</span><span>Eenheid</span><span>Schaal</span>
      <span>Signed</span><span>Input</span><span></span>
    </div>
    <div id="regRows"></div>
    <button class="btn btn-sm" id="btnAddReg" style="margin-top:8px;">+ Register</button>

    <div style="display:flex;gap:8px;margin-top:14px;">
      <button class="btn btn-green btn-full" id="btnSaveProfile">Opslaan</button>
      <button class="btn btn-red btn-sm" id="btnDeleteProfile">Verwijderen</button>
    </div>
  </div>
</div>

</div><!-- .app -->

<script>
(function(){
'use strict';

// ─── BLE UUIDs ────────────────────────────────────────────────────
const SVC    = '4e53ff01-1b8a-4f3c-9a5b-7d6e8c2f0a1b';
const C_DATA = '4e53ff02-1b8a-4f3c-9a5b-7d6e8c2f0a1b';
const C_STAT = '4e53ff03-1b8a-4f3c-9a5b-7d6e8c2f0a1b';
const C_CFG  = '4e53ff04-1b8a-4f3c-9a5b-7d6e8c2f0a1b';
const C_CMD  = '4e53ff05-1b8a-4f3c-9a5b-7d6e8c2f0a1b';

const STORAGE_KEY = 'koeldiag_profiles';

// ─── State ────────────────────────────────────────────────────────
let profiles = [];
let editingId = null;
let activeProfile = null;
let bleDevice = null, bleServer = null, cmdChar = null;
let connected = false;

// ─── DOM ──────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const badge = $('badge'), badgeText = $('badgeText');
const selProfile = $('selProfile'), btnConnect = $('btnConnect');
const regCards = $('regCards'), logBox = $('logBox'), emptyState = $('emptyState');
const sUp = $('sUp'), sBaud = $('sBaud'), sOk = $('sOk'), sErr = $('sErr');
const profileList = $('profileList'), editor = $('editor'), editorTitle = $('editorTitle');
const eName = $('eName'), eSlaveId = $('eSlaveId'), eBaud = $('eBaud'), eParity = $('eParity');
const regRows = $('regRows');

// ─── Profiles: localStorage ──────────────────────────────────────
function loadProfiles() {
  try { profiles = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch(e) { profiles = []; }
}
function saveProfiles() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(profiles));
}
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// ─── Tabs ─────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.setAttribute('aria-selected','false'));
    tab.setAttribute('aria-selected','true');
    document.querySelectorAll('.panel').forEach(p => p.removeAttribute('data-active'));
    $('panel' + (tab.dataset.tab === 'dash' ? 'Dash' : 'Admin')).setAttribute('data-active','');
  });
});

// ─── Profile List Render ──────────────────────────────────────────
function renderProfileList() {
  profileList.innerHTML = '';
  profiles.forEach(p => {
    const div = document.createElement('div');
    div.className = 'profile-item';
    div.dataset.active = editingId === p.id ? 'true' : 'false';
    div.innerHTML = `
      <div>
        <div class="profile-name">${esc(p.name || 'Naamloos')}</div>
        <div class="profile-meta">Slave ${p.slaveId} | ${p.baud} baud | ${p.registers?.length || 0} regs</div>
      </div>
      <div class="profile-actions">
        <button class="btn btn-sm" data-edit="${p.id}">Bewerk</button>
      </div>
    `;
    div.querySelector('[data-edit]').addEventListener('click', e => {
      e.stopPropagation();
      openEditor(p.id);
    });
    profileList.appendChild(div);
  });
}

function renderProfileSelect() {
  const cur = selProfile.value;
  selProfile.innerHTML = '<option value="">— Kies profiel —</option>';
  profiles.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p.id;
    opt.textContent = p.name || 'Naamloos';
    selProfile.appendChild(opt);
  });
  if (cur) selProfile.value = cur;
}

// ─── Profile Editor ───────────────────────────────────────────────
function openEditor(id) {
  const p = profiles.find(x => x.id === id);
  if (!p) return;
  editingId = id;
  editor.style.display = 'block';
  editorTitle.textContent = 'Profiel: ' + (p.name || 'Naamloos');
  eName.value = p.name || '';
  eSlaveId.value = p.slaveId || 1;
  eBaud.value = p.baud || 9600;
  eParity.value = p.parity || '8N1';
  renderRegRows(p.registers || []);
  renderProfileList();
}

function closeEditor() {
  editingId = null;
  editor.style.display = 'none';
  renderProfileList();
}

// ─── Register Row Editor ──────────────────────────────────────────
function renderRegRows(regs) {
  regRows.innerHTML = '';
  regs.forEach((r, i) => addRegRow(r, i));
}

function addRegRow(r, idx) {
  const row = document.createElement('div');
  row.className = 'reg-row';
  row.dataset.idx = idx !== undefined ? idx : regRows.children.length;
  row.innerHTML = `
    <input type="number" class="r-addr" value="${r?.address ?? ''}" placeholder="0" min="0" max="65535" aria-label="Register adres">
    <input type="text" class="r-name" value="${esc(r?.name ?? '')}" placeholder="naam" aria-label="Register naam">
    <input type="text" class="r-unit" value="${esc(r?.unit ?? '')}" placeholder="°C" aria-label="Eenheid">
    <input type="number" class="r-scale" value="${r?.scale ?? 1}" step="0.01" aria-label="Schaalfactor">
    <input type="checkbox" class="cb r-signed" ${r?.isSigned ? 'checked' : ''} aria-label="Signed">
    <input type="checkbox" class="cb r-input" ${r?.isInput ? 'checked' : ''} aria-label="Input register">
    <button class="del-btn" aria-label="Verwijder register">&times;</button>
  `;
  row.querySelector('.del-btn').addEventListener('click', () => row.remove());
  regRows.appendChild(row);
}

function collectRegisters() {
  const regs = [];
  regRows.querySelectorAll('.reg-row').forEach(row => {
    const addr = parseInt(row.querySelector('.r-addr').value);
    const name = row.querySelector('.r-name').value.trim();
    if (isNaN(addr) || !name) return;
    regs.push({
      address: addr,
      name: name.replace(/[^a-zA-Z0-9_]/g, '_').substring(0, 19),
      unit: row.querySelector('.r-unit').value.trim().substring(0, 7),
      scale: parseFloat(row.querySelector('.r-scale').value) || 1,
      isSigned: row.querySelector('.r-signed').checked,
      isInput: row.querySelector('.r-input').checked,
    });
  });
  return regs;
}

// ─── Profile CRUD ─────────────────────────────────────────────────
$('btnNewProfile').addEventListener('click', () => {
  const p = { id: genId(), name: 'Nieuw profiel', slaveId: 1, baud: 9600, parity: '8N1', registers: [] };
  profiles.push(p);
  saveProfiles();
  renderProfileList();
  renderProfileSelect();
  openEditor(p.id);
});

$('btnSaveProfile').addEventListener('click', () => {
  if (!editingId) return;
  const p = profiles.find(x => x.id === editingId);
  if (!p) return;
  p.name = eName.value.trim() || 'Naamloos';
  p.slaveId = parseInt(eSlaveId.value) || 1;
  p.baud = parseInt(eBaud.value) || 9600;
  p.parity = eParity.value;
  p.registers = collectRegisters();
  saveProfiles();
  renderProfileList();
  renderProfileSelect();
  editorTitle.textContent = 'Profiel: ' + p.name;
  log('Profiel opgeslagen: ' + p.name, 'success');
});

$('btnDeleteProfile').addEventListener('click', () => {
  if (!editingId) return;
  const p = profiles.find(x => x.id === editingId);
  if (!confirm('Profiel "' + (p?.name || '') + '" verwijderen?')) return;
  profiles = profiles.filter(x => x.id !== editingId);
  saveProfiles();
  closeEditor();
  renderProfileList();
  renderProfileSelect();
  log('Profiel verwijderd', 'warn');
});

$('btnAddReg').addEventListener('click', () => addRegRow({}, regRows.children.length));

// ─── BLE Connection ───────────────────────────────────────────────
btnConnect.addEventListener('click', async () => {
  if (connected) { disconnect(); return; }

  const pid = selProfile.value;
  if (!pid) { log('Selecteer eerst een profiel', 'warn'); return; }
  activeProfile = profiles.find(x => x.id === pid);
  if (!activeProfile || !activeProfile.registers?.length) {
    log('Profiel heeft geen registers', 'error'); return;
  }

  try {
    setStatus('wait', 'Zoeken...');
    btnConnect.disabled = true;
    log('Bluetooth scan...', 'info');

    bleDevice = await navigator.bluetooth.requestDevice({
      filters: [{ services: [SVC] }],
      optionalServices: [SVC]
    });
    bleDevice.addEventListener('gattserverdisconnected', onDisconnect);

    setStatus('wait', 'Verbinden...');
    bleServer = await bleDevice.gatt.connect();
    log('GATT verbonden', 'success');

    const service = await bleServer.getPrimaryService(SVC);
    cmdChar = await service.getCharacteristic(C_CMD);

    // Stuur profiel naar ESP32
    await sendProfile(activeProfile);

    // Subscribe to data notifications
    const dataChar = await service.getCharacteristic(C_DATA);
    await dataChar.startNotifications();
    dataChar.addEventListener('characteristicvaluechanged', onData);

    connected = true;
    setStatus('on', 'Verbonden');
    btnConnect.textContent = 'Verbreken';
    btnConnect.className = 'btn btn-red';
    emptyState.style.display = 'none';
    buildDashCards(activeProfile);
    sBaud.textContent = activeProfile.baud;
    log('Verbonden — profiel: ' + activeProfile.name, 'success');
  } catch(e) {
    if (e.name === 'NotFoundError') {
      setStatus('off', 'Niet verbonden');
      log('Geen apparaat geselecteerd', 'warn');
    } else {
      setStatus('err', 'Fout');
      log('Fout: ' + e.message, 'error');
    }
  } finally {
    btnConnect.disabled = false;
  }
});

function disconnect() {
  if (bleDevice?.gatt?.connected) bleDevice.gatt.disconnect();
  cleanup();
  log('Losgekoppeld', 'info');
}

function cleanup() {
  connected = false;
  bleServer = null; cmdChar = null;
  setStatus('off', 'Niet verbonden');
  btnConnect.textContent = 'Verbinden';
  btnConnect.className = 'btn btn-green';
}

function onDisconnect() {
  log('Verbinding verloren', 'warn');
  cleanup();
}

// ─── Send Profile to ESP32 ────────────────────────────────────────
async function sendProfile(p) {
  const enc = new TextEncoder();

  // 1. Config header
  const cfg = JSON.stringify({
    cmd: 'cfg',
    slave: p.slaveId,
    baud: p.baud,
    count: p.registers.length
  });
  log('Stuur config: slave=' + p.slaveId + ' baud=' + p.baud, 'info');
  await cmdChar.writeValueWithoutResponse(enc.encode(cfg));
  await delay(200);

  // 2. Registers one by one
  for (let i = 0; i < p.registers.length; i++) {
    const r = p.registers[i];
    const reg = JSON.stringify({
      cmd: 'reg', i: i,
      a: r.address, n: r.name, u: r.unit,
      s: r.scale, sg: r.isSigned ? 1 : 0, in: r.isInput ? 1 : 0
    });
    await cmdChar.writeValueWithoutResponse(enc.encode(reg));
    await delay(100);
  }
  log(p.registers.length + ' registers verstuurd', 'success');

  // 3. Start polling
  await delay(200);
  await cmdChar.writeValueWithoutResponse(enc.encode('{"cmd":"start"}'));
  log('Polling gestart', 'success');
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

// ─── Data Handler ─────────────────────────────────────────────────
function onData(event) {
  try {
    const raw = new TextDecoder().decode(event.target.value);
    const data = JSON.parse(raw);
    updateDashCards(data);
    if (data.ok !== undefined) sOk.textContent = data.ok;
    if (data.err !== undefined) sErr.textContent = data.err;
    if (data.ts !== undefined) sUp.textContent = fmtTime(data.ts);
  } catch(e) {
    log('Parse error: ' + e.message, 'error');
  }
}

// ─── Dashboard Cards ──────────────────────────────────────────────
function buildDashCards(profile) {
  regCards.innerHTML = '';
  if (!profile?.registers) return;
  profile.registers.forEach(r => {
    const card = document.createElement('div');
    card.className = 'reg-card';
    card.id = 'rc-' + r.name;
    card.innerHTML = `
      <div>
        <div class="reg-name">${esc(r.name)}</div>
        <div class="reg-addr">${r.isInput ? 'Input' : 'Holding'} reg ${r.address}</div>
      </div>
      <div class="reg-val" data-s="null" id="rv-${r.name}">--</div>
    `;
    regCards.appendChild(card);
  });
}

function updateDashCards(data) {
  if (!data?.regs) return;
  data.regs.forEach(r => {
    const valEl = document.querySelector('#rv-' + r.n);
    const cardEl = document.querySelector('#rc-' + r.n);
    if (!valEl || !cardEl) return;

    if (r.v === null || r.v === undefined) {
      valEl.dataset.s = 'null';
      valEl.innerHTML = '<span style="font-style:italic;font-size:0.78rem">geen data</span>';
      return;
    }

    cardEl.dataset.fresh = 'true';
    setTimeout(() => cardEl.dataset.fresh = 'false', 600);

    valEl.dataset.s = '';
    valEl.innerHTML = `<span>${r.v}</span><span class="reg-unit">${esc(r.u)}</span>`;
  });
}

// ─── Helpers ──────────────────────────────────────────────────────
function setStatus(s, txt) { badge.dataset.s = s; badgeText.textContent = txt; }

function fmtTime(sec) {
  if (sec < 60) return sec + 's';
  if (sec < 3600) return Math.floor(sec/60) + 'm';
  return Math.floor(sec/3600) + 'u ' + Math.floor((sec%3600)/60) + 'm';
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function log(msg, type) {
  const t = new Date().toLocaleTimeString('nl-NL', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const e = document.createElement('div');
  e.className = 'log-entry';
  e.innerHTML = `<span class="log-t">${t}</span><span class="log-m" data-t="${type}">${esc(msg)}</span>`;
  logBox.appendChild(e);
  while (logBox.children.length > 80) logBox.removeChild(logBox.firstChild);
  logBox.scrollTop = logBox.scrollHeight;
}

// ─── Init ─────────────────────────────────────────────────────────
function init() {
  if (!navigator.bluetooth) {
    $('compat').style.display = 'block';
    btnConnect.disabled = true;
  }
  loadProfiles();
  renderProfileList();
  renderProfileSelect();
  log('KoelDiag v3 gestart', 'info');
}

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else init();

})();
</script>
